name: anees
description: "Anees"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Quran display engine — authentic Medina Mushaf rendering
  quran_library: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  quran_library:
    path: packages/quran_library

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: true
    image_path: "icon.png"

  assets:
    - assets/data/
    - assets/fonts/

  fonts:
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs_V20.ttf
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-VariableFont_wght.ttf
    - family: SurahNameNaskh
      fonts:
        - asset: assets/fonts/surah_name_naskh.ttf
    - family: SurahNameV4
      fonts:
        - asset: assets/fonts/surah-name-v4.ttf
